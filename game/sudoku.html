<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Game</title>
  <style>
    :root {
      --bg1: #f7f4ea;
      --bg2: #e8f3ef;
      --panel: #ffffff;
      --line: #9fb7ad;
      --line-strong: #2f4f4f;
      --clue-bg: #e8efe8;
      --clue-text: #183a37;
      --input-bg: #ffffff;
      --input-text: #1f2937;
      --accent: #0f766e;
      --accent-2: #b45309;
      --ok: #166534;
      --bad: #991b1b;
      --focus: #14b8a6;
      --shadow: 0 10px 30px rgba(20, 58, 56, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      color: #102a2a;
      background:
        radial-gradient(circle at 10% 10%, #fffaf0 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #d6f5ec 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      position: relative;
      width: min(96vw, 620px);
      background: var(--panel);
      border: 1px solid #d7e2dc;
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 20px 18px 18px;
    }

    h1 {
      margin: 0 0 10px;
      text-align: left;
      font-size: clamp(1.5rem, 2.8vw, 2rem);
      letter-spacing: 0.4px;
      color: #1e3a3a;
      padding-right: 140px;
    }

    h1 .byline {
      font-style: italic;
    }

    .subtitle {
      margin: 0 0 14px;
      text-align: left;
      color: #36514f;
      font-size: 0.82rem;
    }

    .board-wrap {
      display: grid;
      place-items: center;
      margin-bottom: 14px;
    }

    .board {
      width: min(88vw, 500px);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      border: 3px solid var(--line-strong);
      border-radius: 8px;
      overflow: hidden;
      background: #fdfefe;
    }

    .cell {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      outline: none;
      text-align: center;
      font-size: clamp(1rem, 2.5vw, 1.45rem);
      font-weight: 600;
      color: var(--input-text);
      background: var(--input-bg);
      caret-color: var(--accent);
      transition: background-color 0.15s ease, box-shadow 0.15s ease;
    }

    .cell:focus {
      background: #effcf9;
      box-shadow: inset 0 0 0 2px var(--focus);
    }

    .cell.clue {
      background: var(--clue-bg);
      color: var(--clue-text);
      font-weight: 800;
      cursor: default;
    }

    .cell.user-filled {
      color: #0f3c7a;
    }

    .cell.invalid {
      background: #fde8e8;
      color: #7f1d1d;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      min-width: 128px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 0.06s ease, filter 0.2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .check-btn {
      background: var(--accent);
      color: #fff;
    }

    .new-btn {
      background: var(--accent-2);
      color: #fff;
    }

    button:hover {
      filter: brightness(1.05);
    }

    .status {
      margin: 14px auto 4px;
      min-height: 1.5em;
      text-align: center;
      font-weight: 700;
      padding: 6px 8px;
      border-radius: 8px;
      width: fit-content;
      max-width: 100%;
    }

    .status.ok {
      color: var(--ok);
      background: #ecfdf3;
    }

    .status.bad {
      color: var(--bad);
      background: #fef2f2;
    }

    .status.info {
      color: #1f4a68;
      background: #edf7ff;
    }

    .legend {
      margin-top: 12px;
      font-size: 0.88rem;
      color: #3a5755;
      text-align: center;
    }

    .timer {
      position: absolute;
      top: 14px;
      right: 14px;
      margin: 0;
      width: auto;
      padding: 6px 10px;
      border-radius: 8px;
      background: #f3faf9;
      color: #0f4b45;
      font-weight: 700;
      border: 1px solid #cfe4de;
      letter-spacing: 0.3px;
    }

    @media (max-width: 460px) {
      .app {
        padding: 14px 10px 12px;
      }

      h1 {
        padding-right: 110px;
      }

      .subtitle {
        font-size: 0.78rem;
      }

      .timer {
        top: 10px;
        right: 10px;
        font-size: 0.85rem;
        padding: 5px 8px;
      }

      button {
        min-width: 114px;
        padding: 9px 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Sudoku - <span class="byline">by Udhay</span></h1>
    <p class="subtitle">Fill every row, column, and 3x3 box with numbers 1-9.</p>

    <section class="board-wrap">
      <div id="board" class="board" aria-label="Sudoku Grid"></div>
    </section>

    <div class="controls">
      <button id="checkBtn" class="check-btn" type="button">Check Solution</button>
      <button id="newBtn" class="new-btn" type="button">New Puzzle</button>
    </div>

    <p id="timer" class="timer">Time: 00:00</p>

    <p id="status" class="status info">Enter numbers 1-9 in empty cells.</p>
    <p class="legend">Tip: Clue cells are locked and cannot be edited.</p>
  </main>

  <script>
    // A few ready-made puzzles (0 means empty).
    const PUZZLES = [
      [
        [5,3,0,0,7,0,0,0,0],
        [6,0,0,1,9,5,0,0,0],
        [0,9,8,0,0,0,0,6,0],
        [8,0,0,0,6,0,0,0,3],
        [4,0,0,8,0,3,0,0,1],
        [7,0,0,0,2,0,0,0,6],
        [0,6,0,0,0,0,2,8,0],
        [0,0,0,4,1,9,0,0,5],
        [0,0,0,0,8,0,0,7,9]
      ],
      [
        [0,0,0,2,6,0,7,0,1],
        [6,8,0,0,7,0,0,9,0],
        [1,9,0,0,0,4,5,0,0],
        [8,2,0,1,0,0,0,4,0],
        [0,0,4,6,0,2,9,0,0],
        [0,5,0,0,0,3,0,2,8],
        [0,0,9,3,0,0,0,7,4],
        [0,4,0,0,5,0,0,3,6],
        [7,0,3,0,1,8,0,0,0]
      ],
      [
        [0,2,0,6,0,8,0,0,0],
        [5,8,0,0,0,9,7,0,0],
        [0,0,0,0,4,0,0,0,0],
        [3,7,0,0,0,0,5,0,0],
        [6,0,0,0,0,0,0,0,4],
        [0,0,8,0,0,0,0,1,3],
        [0,0,0,0,2,0,0,0,0],
        [0,0,9,8,0,0,0,3,6],
        [0,0,0,3,0,6,0,9,0]
      ]
    ];

    const boardEl = document.getElementById("board");
    const timerEl = document.getElementById("timer");
    const statusEl = document.getElementById("status");
    const checkBtn = document.getElementById("checkBtn");
    const newBtn = document.getElementById("newBtn");

    let currentPuzzle = [];
    let elapsedSeconds = 0;
    let timerId = null;
    let timerStarted = false;

    function cloneGrid(grid) {
      return grid.map(row => [...row]);
    }

    function setStatus(message, type = "info") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function randomPuzzle() {
      const idx = Math.floor(Math.random() * PUZZLES.length);
      return cloneGrid(PUZZLES[idx]);
    }

    function formatTime(totalSeconds) {
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function renderTimer() {
      timerEl.textContent = `Time: ${formatTime(elapsedSeconds)}`;
    }

    function startTimer() {
      if (timerStarted) return;
      timerStarted = true;
      timerId = setInterval(() => {
        elapsedSeconds += 1;
        renderTimer();
      }, 1000);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function resetTimer() {
      stopTimer();
      elapsedSeconds = 0;
      timerStarted = false;
      renderTimer();
    }

    function clearValidationMarks() {
      const cells = boardEl.querySelectorAll(".cell");
      cells.forEach(cell => cell.classList.remove("invalid"));
    }

    function createBoard(puzzle) {
      boardEl.innerHTML = "";
      currentPuzzle = cloneGrid(puzzle);

      for (let row = 0; row < 9; row++) {
        for (let col = 0; col < 9; col++) {
          const input = document.createElement("input");
          input.type = "text";
          input.inputMode = "numeric";
          input.maxLength = 1;
          input.className = "cell";
          input.setAttribute("aria-label", `Row ${row + 1}, Column ${col + 1}`);

          // Add thicker subgrid boundaries.
          if (col % 3 === 0) input.style.borderLeftWidth = "3px";
          if (row % 3 === 0) input.style.borderTopWidth = "3px";
          if (col === 8) input.style.borderRightWidth = "3px";
          if (row === 8) input.style.borderBottomWidth = "3px";

          if (puzzle[row][col] !== 0) {
            input.value = String(puzzle[row][col]);
            input.readOnly = true;
            input.classList.add("clue");
          } else {
            input.dataset.row = String(row);
            input.dataset.col = String(col);

            // Keep only one digit from 1-9, reject everything else.
            input.addEventListener("input", () => {
              clearValidationMarks();
              const cleaned = input.value.replace(/[^1-9]/g, "").slice(0, 1);
              input.value = cleaned;
              if (cleaned) {
                input.classList.add("user-filled");
                // Start timing only after the first actual entry by the player.
                startTimer();
              } else {
                input.classList.remove("user-filled");
              }
              setStatus("Keep going. Use digits 1-9 only.", "info");
            });

            // Improve keyboard usability (Backspace/Delete allowed naturally).
            input.addEventListener("keydown", (e) => {
              const allowedControlKeys = [
                "Backspace", "Delete", "ArrowLeft", "ArrowRight",
                "ArrowUp", "ArrowDown", "Tab"
              ];
              if (allowedControlKeys.includes(e.key)) return;
              if (!/^[1-9]$/.test(e.key)) e.preventDefault();
            });
          }

          boardEl.appendChild(input);
        }
      }
    }

    function readBoard() {
      const values = [];
      const cells = boardEl.querySelectorAll(".cell");

      for (let row = 0; row < 9; row++) {
        values[row] = [];
        for (let col = 0; col < 9; col++) {
          const idx = row * 9 + col;
          const val = cells[idx].value.trim();
          values[row][col] = val === "" ? 0 : Number(val);
        }
      }
      return values;
    }

    function hasAllDigits1to9(arr) {
      if (arr.some(n => n < 1 || n > 9)) return false;
      return new Set(arr).size === 9;
    }

    function isValidSudoku(grid) {
      // Check rows.
      for (let row = 0; row < 9; row++) {
        if (!hasAllDigits1to9(grid[row])) return false;
      }

      // Check columns.
      for (let col = 0; col < 9; col++) {
        const colVals = [];
        for (let row = 0; row < 9; row++) colVals.push(grid[row][col]);
        if (!hasAllDigits1to9(colVals)) return false;
      }

      // Check 3x3 boxes.
      for (let boxRow = 0; boxRow < 9; boxRow += 3) {
        for (let boxCol = 0; boxCol < 9; boxCol += 3) {
          const boxVals = [];
          for (let r = boxRow; r < boxRow + 3; r++) {
            for (let c = boxCol; c < boxCol + 3; c++) {
              boxVals.push(grid[r][c]);
            }
          }
          if (!hasAllDigits1to9(boxVals)) return false;
        }
      }

      return true;
    }

    function markConflicts(grid) {
      clearValidationMarks();
      const cells = boardEl.querySelectorAll(".cell");

      // Mark empty user cells quickly.
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const idx = r * 9 + c;
          if (!cells[idx].readOnly && grid[r][c] === 0) {
            cells[idx].classList.add("invalid");
          }
        }
      }

      // Highlight duplicate values in rows, columns, and boxes.
      function markDuplicates(indices) {
        const counts = new Map();
        indices.forEach(i => {
          const val = Number(cells[i].value);
          if (val >= 1 && val <= 9) counts.set(val, (counts.get(val) || 0) + 1);
        });
        indices.forEach(i => {
          const val = Number(cells[i].value);
          if (val >= 1 && val <= 9 && counts.get(val) > 1 && !cells[i].readOnly) {
            cells[i].classList.add("invalid");
          }
        });
      }

      // Rows.
      for (let r = 0; r < 9; r++) {
        const indices = [];
        for (let c = 0; c < 9; c++) indices.push(r * 9 + c);
        markDuplicates(indices);
      }

      // Columns.
      for (let c = 0; c < 9; c++) {
        const indices = [];
        for (let r = 0; r < 9; r++) indices.push(r * 9 + c);
        markDuplicates(indices);
      }

      // Boxes.
      for (let br = 0; br < 9; br += 3) {
        for (let bc = 0; bc < 9; bc += 3) {
          const indices = [];
          for (let r = br; r < br + 3; r++) {
            for (let c = bc; c < bc + 3; c++) {
              indices.push(r * 9 + c);
            }
          }
          markDuplicates(indices);
        }
      }
    }

    function checkSolution() {
      const grid = readBoard();
      const hasEmpty = grid.flat().some(v => v === 0);

      if (hasEmpty) {
        markConflicts(grid);
        setStatus("Board is incomplete. Fill all cells with digits 1-9.", "bad");
        return;
      }

      if (isValidSudoku(grid)) {
        stopTimer();
        clearValidationMarks();
        setStatus(`Excellent! This is a valid Sudoku solution. Time: ${formatTime(elapsedSeconds)}.`, "ok");
      } else {
        markConflicts(grid);
        setStatus("Not valid yet. Check highlighted cells for conflicts.", "bad");
      }
    }

    checkBtn.addEventListener("click", checkSolution);

    newBtn.addEventListener("click", () => {
      createBoard(randomPuzzle());
      resetTimer();
      setStatus("New puzzle loaded. Good luck!", "info");
    });

    // Initial render.
    createBoard(randomPuzzle());
    resetTimer();
  </script>
</body>
</html>
