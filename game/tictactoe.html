<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Multiplayer & AI Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 12px;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
            max-height: 95vh;
            overflow-y: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #666;
            font-size: 0.8em;
        }

        /* Mode Selection */
        .mode-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mode-btn {
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f0f0f0;
            color: #333;
            border: 2px solid transparent;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }

        /* Difficulty Selection */
        .difficulty-section {
            display: none;
            margin-bottom: 10px;
        }

        .difficulty-section.active {
            display: block;
        }

        .difficulty-label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
            font-size: 0.9em;
        }

        .difficulty-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .difficulty-btn {
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8em;
        }

        .difficulty-btn:hover {
            background: #667eea;
            color: white;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
        }

        /* Game Status */
        .status-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
            min-height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95em;
        }

        /* Game Board */
        .game-board {
            display: none;
            margin-bottom: 20px;
        }

        .game-board.active {
            display: block;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-bottom: 12px;
            background: #667eea;
            padding: 5px;
            border-radius: 10px;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 2.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .cell:hover:not(:disabled) {
            transform: scale(0.95);
            background: #f5f5f5;
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .cell.x {
            color: #667eea;
        }

        .cell.o {
            color: #764ba2;
        }

        /* Score Board */
        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .score-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .score-label {
            color: #666;
            font-size: 0.8em;
            margin-bottom: 3px;
        }

        .score-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        /* Control Buttons */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5em;
                margin-bottom: 3px;
            }

            .cell {
                font-size: 1.8em;
            }

            .status-bar {
                font-size: 0.85em;
                padding: 8px;
            }

            .mode-selection {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .mode-btn {
                padding: 10px;
                font-size: 0.85em;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.3em;
            }

            .cell {
                font-size: 1.4em;
            }

            .score-value {
                font-size: 1.2em;
            }

            .difficulty-buttons {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .board {
                padding: 4px;
                gap: 4px;
            }
        }

        /* Animation for game over */
        @keyframes gameOver {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        .game-over {
            animation: gameOver 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Tic Tac Toe</h1>
            <p>Play with Friends or Challenge AI</p>
        </div>

        <div class="mode-selection">
            <button class="mode-btn active" onclick="setGameMode('friend')">👥 With Friends</button>
            <button class="mode-btn" onclick="setGameMode('ai')">🤖 Challenge AI</button>
        </div>

        <div class="difficulty-section" id="difficultySection">
            <label class="difficulty-label">Select AI Difficulty:</label>
            <div class="difficulty-buttons">
                <button class="difficulty-btn active" onclick="setDifficulty('easy')">Easy</button>
                <button class="difficulty-btn" onclick="setDifficulty('medium')">Medium</button>
                <button class="difficulty-btn" onclick="setDifficulty('hard')">Hard</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar">Player X's Turn</div>

        <div class="game-board active" id="gameBoard">
            <div class="board" id="board">
                <button class="cell" onclick="makeMove(0)"></button>
                <button class="cell" onclick="makeMove(1)"></button>
                <button class="cell" onclick="makeMove(2)"></button>
                <button class="cell" onclick="makeMove(3)"></button>
                <button class="cell" onclick="makeMove(4)"></button>
                <button class="cell" onclick="makeMove(5)"></button>
                <button class="cell" onclick="makeMove(6)"></button>
                <button class="cell" onclick="makeMove(7)"></button>
                <button class="cell" onclick="makeMove(8)"></button>
            </div>

            <div class="scoreboard">
                <div class="score-item">
                    <div class="score-label">Player X</div>
                    <div class="score-value" id="scoreX">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Draws</div>
                    <div class="score-value" id="scoreDraw">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Player O</div>
                    <div class="score-value" id="scoreO">0</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="resetGame()">New Game</button>
                <button class="btn btn-secondary" onclick="resetAll()">Reset All</button>
            </div>
        </div>
    </div>

    <script>
        // Game Variables
        let gameMode = 'friend'; // 'friend' or 'ai'
        let aiDifficulty = 'easy'; // 'easy', 'medium', 'hard'
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameOver = false;
        let scores = {
            X: 0,
            O: 0,
            draw: 0
        };

        const winningCombinations = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        // Set Game Mode
        function setGameMode(mode) {
            gameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const diffSection = document.getElementById('difficultySection');
            if (mode === 'ai') {
                diffSection.classList.add('active');
            } else {
                diffSection.classList.remove('active');
            }

            resetGame();
        }

        // Set AI Difficulty
        function setDifficulty(level) {
            aiDifficulty = level;
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            resetGame();
        }

        // Make a Move
        function makeMove(index) {
            if (board[index] || gameOver) return;

            board[index] = currentPlayer;
            updateDisplay();

            if (checkWin(currentPlayer)) {
                scores[currentPlayer]++;
                updateScores();
                updateStatus(`🎉 Player ${currentPlayer} Wins!`);
                gameOver = true;
                disableAllCells();
                return;
            }

            if (board.every(cell => cell !== '')) {
                scores.draw++;
                updateScores();
                updateStatus("🤝 It's a Draw!");
                gameOver = true;
                disableAllCells();
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';

            if (gameMode === 'ai' && currentPlayer === 'O' && !gameOver) {
                updateStatus("🤖 AI is thinking...");
                setTimeout(makeAIMove, 800);
            } else {
                updateStatus(`${currentPlayer === 'X' ? '❌' : '⭕'} Player ${currentPlayer}'s Turn`);
            }
        }

        // AI Move Logic
        function makeAIMove() {
            if (gameOver) return;

            let move;
            if (aiDifficulty === 'hard') {
                move = getBestMove();
            } else if (aiDifficulty === 'medium') {
                move = Math.random() < 0.6 ? getBestMove() : getRandomMove();
            } else {
                move = getRandomMove();
            }

            board[move] = 'O';
            updateDisplay();

            if (checkWin('O')) {
                scores.O++;
                updateScores();
                updateStatus("🤖 AI Wins!");
                gameOver = true;
                disableAllCells();
                return;
            }

            if (board.every(cell => cell !== '')) {
                scores.draw++;
                updateScores();
                updateStatus("🤝 It's a Draw!");
                gameOver = true;
                disableAllCells();
                return;
            }

            currentPlayer = 'X';
            updateStatus("❌ Your Turn");
        }

        // Get Best Move (Minimax Algorithm)
        function getBestMove() {
            let bestScore = -Infinity;
            let move = 0;

            for (let i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    let score = minimax(board, 0, false);
                    board[i] = '';

                    if (score > bestScore) {
                        bestScore = score;
                        move = i;
                    }
                }
            }

            return move;
        }

        // Minimax Algorithm
        function minimax(board, depth, isMaximizing) {
            const winner = checkWinner(board);

            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return depth - 10;
            if (board.every(cell => cell !== '')) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        let score = minimax(board, depth + 1, false);
                        board[i] = '';
                        bestScore = Math.max(score, bestScore);
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        let score = minimax(board, depth + 1, true);
                        board[i] = '';
                        bestScore = Math.min(score, bestScore);
                    }
                }
                return bestScore;
            }
        }

        // Get Random Move
        function getRandomMove() {
            const emptyIndices = board
                .map((cell, index) => cell === '' ? index : null)
                .filter(i => i !== null);
            return emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
        }

        // Check Win
        function checkWin(player) {
            return winningCombinations.some(combo =>
                combo.every(index => board[index] === player)
            );
        }

        // Check Winner (for minimax)
        function checkWinner(board) {
            for (let combo of winningCombinations) {
                if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]]) {
                    return board[combo[0]];
                }
            }
            return null;
        }

        // Update Display
        function updateDisplay() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, index) => {
                cell.textContent = board[index];
                cell.className = 'cell';
                if (board[index] === 'X') {
                    cell.classList.add('x');
                } else if (board[index] === 'O') {
                    cell.classList.add('o');
                }
            });
        }

        // Update Status
        function updateStatus(message) {
            document.getElementById('statusBar').textContent = message;
        }

        // Update Scores
        function updateScores() {
            document.getElementById('scoreX').textContent = scores.X;
            document.getElementById('scoreO').textContent = scores.O;
            document.getElementById('scoreDraw').textContent = scores.draw;
        }

        // Disable All Cells
        function disableAllCells() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.disabled = true;
            });
        }

        // Reset Game
        function resetGame() {
            board = ['', '', '', '', '', '', '', '', ''];
            currentPlayer = 'X';
            gameOver = false;
            document.querySelectorAll('.cell').forEach(cell => {
                cell.disabled = false;
                cell.textContent = '';
            });

            if (gameMode === 'friend') {
                updateStatus("❌ Player X's Turn");
            } else {
                updateStatus("❌ Your Turn");
            }

            updateDisplay();
        }

        // Reset All
        function resetAll() {
            if (confirm('Are you sure you want to reset all scores?')) {
                scores = { X: 0, O: 0, draw: 0 };
                updateScores();
                resetGame();
            }
        }

        // Initialize Game
        updateScores();
    </script>
</body>
</html>
