<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <style>
    :root {
      --bg-a: #f7f0dc;
      --bg-b: #f3dec0;
      --ink: #35281f;
      --subtle: #705f52;
      --panel: rgba(255, 247, 234, 0.93);
      --board: #b89f80;
      --cell: rgba(255, 243, 224, 0.35);
      --btn: #9c6b3c;
      --btn-hover: #86562b;
      --tile-2: #eee4da;
      --tile-4: #ede0c8;
      --tile-8: #f2b179;
      --tile-16: #f59563;
      --tile-32: #f67c5f;
      --tile-64: #f65e3b;
      --tile-128: #edcf72;
      --tile-256: #edcc61;
      --tile-512: #edc850;
      --tile-1024: #edc53f;
      --tile-2048: #edc22e;
      --tile-super: #3c3a32;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 255, 255, 0.45), transparent 34%),
        radial-gradient(circle at 88% 88%, rgba(156, 107, 60, 0.22), transparent 38%),
        linear-gradient(145deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: 24px 14px;
    }

    .app {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid rgba(94, 70, 50, 0.16);
      border-radius: 20px;
      box-shadow: 0 16px 34px rgba(75, 50, 29, 0.22);
      padding: 22px;
    }

    .top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1;
      letter-spacing: 0.03em;
    }

    .note {
      margin: 6px 0 0;
      color: var(--subtle);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      background: #b68b60;
      color: #fff;
      border-radius: 10px;
      padding: 8px 12px;
      min-width: 90px;
      text-align: center;
    }

    .stat span {
      display: block;
      font-size: 0.72rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 1.2rem;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      background: var(--btn);
      color: #fff;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 150ms ease, transform 120ms ease;
    }

    .btn:hover {
      background: var(--btn-hover);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .hint {
      margin: 0;
      font-size: 0.92rem;
      color: var(--subtle);
    }

    .board-wrap {
      position: relative;
    }

    .board {
      background: var(--board);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      touch-action: none;
      user-select: none;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      background: var(--cell);
      display: grid;
      place-items: center;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 800;
      color: #7a6754;
      transition: background 150ms ease, color 150ms ease, transform 130ms ease;
    }

    .v2 { background: var(--tile-2); color: #776e65; }
    .v4 { background: var(--tile-4); color: #776e65; }
    .v8 { background: var(--tile-8); color: #f9f6f2; }
    .v16 { background: var(--tile-16); color: #f9f6f2; }
    .v32 { background: var(--tile-32); color: #f9f6f2; }
    .v64 { background: var(--tile-64); color: #f9f6f2; }
    .v128 { background: var(--tile-128); color: #f9f6f2; font-size: clamp(1.05rem, 3.5vw, 1.6rem); }
    .v256 { background: var(--tile-256); color: #f9f6f2; font-size: clamp(1.05rem, 3.5vw, 1.6rem); }
    .v512 { background: var(--tile-512); color: #f9f6f2; font-size: clamp(1.05rem, 3.5vw, 1.6rem); }
    .v1024 { background: var(--tile-1024); color: #f9f6f2; font-size: clamp(0.9rem, 3vw, 1.3rem); }
    .v2048 { background: var(--tile-2048); color: #f9f6f2; font-size: clamp(0.9rem, 3vw, 1.3rem); }
    .v-super { background: var(--tile-super); color: #f9f6f2; font-size: clamp(0.85rem, 2.7vw, 1.2rem); }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(40, 24, 10, 0.58);
      border-radius: 12px;
      text-align: center;
      color: #fff;
      padding: 16px;
    }

    .overlay.show {
      display: grid;
    }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .overlay p {
      margin: 0;
      font-size: 1rem;
      opacity: 0.95;
    }

    .dpad {
      margin-top: 14px;
      display: grid;
      gap: 8px;
      justify-content: center;
    }

    .dpad-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .dpad button {
      width: 62px;
      height: 42px;
      border: none;
      border-radius: 9px;
      background: #d4bb9f;
      color: #3f2a17;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
    }

    .dpad button:hover {
      background: #c9ac8d;
    }

    @media (max-width: 460px) {
      .app {
        padding: 16px;
      }

      .top {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .actions {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="2048 game">
    <section class="top">
      <div>
        <h1>2048</h1>
        <p class="note">Combine equal tiles and reach 2048. Keep moving while space exists.</p>
      </div>
      <div class="stats">
        <div class="stat"><span>Score</span><strong id="score">0</strong></div>
        <div class="stat"><span>Best</span><strong id="best">0</strong></div>
      </div>
    </section>

    <section class="actions">
      <button id="newGame" class="btn" type="button">New Game</button>
      <p class="hint">Use arrow keys, WASD, swipe, or the control pad.</p>
    </section>

    <section class="board-wrap">
      <div id="board" class="board" role="grid" aria-label="2048 board"></div>
      <div id="overlay" class="overlay" role="status" aria-live="polite">
        <div>
          <h2>Game Over</h2>
          <p>No moves left. Start a new game to play again.</p>
        </div>
      </div>
    </section>

    <section class="dpad" aria-label="Move controls">
      <div class="dpad-row">
        <button type="button" data-dir="up" aria-label="Move up">↑</button>
      </div>
      <div class="dpad-row">
        <button type="button" data-dir="left" aria-label="Move left">←</button>
        <button type="button" data-dir="down" aria-label="Move down">↓</button>
        <button type="button" data-dir="right" aria-label="Move right">→</button>
      </div>
    </section>
  </main>

  <script>
    // 2048 state constants.
    const SIZE = 4;
    const STORAGE_KEY = "game2048_best";

    // Game state.
    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem(STORAGE_KEY) || 0);
    let touchStartX = 0;
    let touchStartY = 0;

    const boardEl = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlayEl = document.getElementById("overlay");
    const newGameBtn = document.getElementById("newGame");

    // Build the 4x4 visual cells once; later we only update text and classes.
    const cellEls = [];
    function createBoardCells() {
      boardEl.innerHTML = "";
      for (let i = 0; i < SIZE * SIZE; i += 1) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.setAttribute("role", "gridcell");
        boardEl.appendChild(cell);
        cellEls.push(cell);
      }
    }

    function emptyBoard() {
      return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    // Start a fresh game with two random tiles.
    function startGame() {
      board = emptyBoard();
      score = 0;
      overlayEl.classList.remove("show");
      spawnRandomTile();
      spawnRandomTile();
      render();
    }

    // Pick a random empty spot and add a 2 (90%) or 4 (10%).
    function spawnRandomTile() {
      const empties = [];
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          if (board[row][col] === 0) {
            empties.push({ row, col });
          }
        }
      }

      if (empties.length === 0) {
        return;
      }

      const pick = empties[Math.floor(Math.random() * empties.length)];
      board[pick.row][pick.col] = Math.random() < 0.9 ? 2 : 4;
    }

    // Slide and merge one line from left to right according to 2048 rules.
    function processLine(line) {
      const compact = line.filter((value) => value !== 0);

      // Merge exactly once per pair in move order.
      for (let i = 0; i < compact.length - 1; i += 1) {
        if (compact[i] !== 0 && compact[i] === compact[i + 1]) {
          compact[i] *= 2;
          score += compact[i];
          compact.splice(i + 1, 1);
        }
      }

      while (compact.length < SIZE) {
        compact.push(0);
      }

      return compact;
    }

    function reverseCopy(values) {
      return [...values].reverse();
    }

    function getColumn(col) {
      const out = [];
      for (let row = 0; row < SIZE; row += 1) {
        out.push(board[row][col]);
      }
      return out;
    }

    function setColumn(col, values) {
      for (let row = 0; row < SIZE; row += 1) {
        board[row][col] = values[row];
      }
    }

    function linesEqual(a, b) {
      return a.every((value, idx) => value === b[idx]);
    }

    // Attempt move in one direction; return true when board changed.
    function move(direction) {
      let moved = false;

      if (direction === "left") {
        for (let row = 0; row < SIZE; row += 1) {
          const before = [...board[row]];
          const after = processLine(before);
          board[row] = after;
          if (!linesEqual(before, after)) {
            moved = true;
          }
        }
      }

      if (direction === "right") {
        for (let row = 0; row < SIZE; row += 1) {
          const before = [...board[row]];
          const reversed = reverseCopy(before);
          const merged = processLine(reversed);
          const after = reverseCopy(merged);
          board[row] = after;
          if (!linesEqual(before, after)) {
            moved = true;
          }
        }
      }

      if (direction === "up") {
        for (let col = 0; col < SIZE; col += 1) {
          const before = getColumn(col);
          const after = processLine(before);
          setColumn(col, after);
          if (!linesEqual(before, after)) {
            moved = true;
          }
        }
      }

      if (direction === "down") {
        for (let col = 0; col < SIZE; col += 1) {
          const before = getColumn(col);
          const reversed = reverseCopy(before);
          const merged = processLine(reversed);
          const after = reverseCopy(merged);
          setColumn(col, after);
          if (!linesEqual(before, after)) {
            moved = true;
          }
        }
      }

      return moved;
    }

    function hasEmptyCell() {
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          if (board[row][col] === 0) {
            return true;
          }
        }
      }
      return false;
    }

    // Game is still alive if there is empty space or a mergeable neighbor.
    function canMove() {
      if (hasEmptyCell()) {
        return true;
      }

      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          const value = board[row][col];
          if (col < SIZE - 1 && value === board[row][col + 1]) {
            return true;
          }
          if (row < SIZE - 1 && value === board[row + 1][col]) {
            return true;
          }
        }
      }

      return false;
    }

    function tileClass(value) {
      if (value <= 0) {
        return "";
      }
      if (value <= 2048) {
        return `v${value}`;
      }
      return "v-super";
    }

    function updateBest() {
      if (score > best) {
        best = score;
        localStorage.setItem(STORAGE_KEY, String(best));
      }
    }

    function render() {
      for (let row = 0; row < SIZE; row += 1) {
        for (let col = 0; col < SIZE; col += 1) {
          const idx = row * SIZE + col;
          const value = board[row][col];
          const cell = cellEls[idx];
          cell.textContent = value === 0 ? "" : String(value);
          cell.className = `cell ${tileClass(value)}`.trim();
        }
      }

      updateBest();
      scoreEl.textContent = String(score);
      bestEl.textContent = String(best);
    }

    // Process one player action and perform all post-move tasks.
    function handleMove(direction) {
      if (overlayEl.classList.contains("show")) {
        return;
      }

      const changed = move(direction);
      if (!changed) {
        return;
      }

      spawnRandomTile();
      render();

      if (!canMove()) {
        overlayEl.classList.add("show");
      }
    }

    function directionFromKey(key) {
      const map = {
        ArrowLeft: "left",
        ArrowRight: "right",
        ArrowUp: "up",
        ArrowDown: "down",
        a: "left",
        d: "right",
        w: "up",
        s: "down"
      };
      return map[key] || map[key.toLowerCase()] || null;
    }

    // Keyboard support.
    window.addEventListener("keydown", (event) => {
      const direction = directionFromKey(event.key);
      if (!direction) {
        return;
      }
      event.preventDefault();
      handleMove(direction);
    });

    // Touch swipe support for mobile play.
    boardEl.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    boardEl.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const threshold = 24;

      if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) {
        return;
      }

      if (Math.abs(dx) > Math.abs(dy)) {
        handleMove(dx > 0 ? "right" : "left");
      } else {
        handleMove(dy > 0 ? "down" : "up");
      }
    }, { passive: true });

    // On-screen directional controls.
    document.querySelectorAll("[data-dir]").forEach((button) => {
      button.addEventListener("click", () => {
        handleMove(button.getAttribute("data-dir"));
      });
    });

    newGameBtn.addEventListener("click", startGame);

    createBoardCells();
    bestEl.textContent = String(best);
    startGame();
  </script>
</body>
</html>
