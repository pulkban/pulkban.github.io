<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <style>
        :root {
            --bg-1: #f8fafc;
            --bg-2: #dbeafe;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --key: #e2e8f0;
            --key-operator: #bfdbfe;
            --key-action: #fecaca;
            --key-equals: #86efac;
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(191, 219, 254, 0.6), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(134, 239, 172, 0.4), transparent 35%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .page-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .app-shell {
            width: min(100%, 760px);
            display: grid;
            grid-template-columns: minmax(300px, 360px) minmax(220px, 280px);
            gap: 16px;
            align-items: start;
        }

        .calculator {
            width: 100%;
            background: var(--panel);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow);
        }

        .history-panel {
            background: var(--panel);
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-title {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--muted);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .history-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: #f1f5f9;
            text-align: right;
            font-weight: 600;
            word-break: break-all;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .history-item:hover {
            background: #e2e8f0;
        }

        .history-empty {
            color: var(--muted);
            text-align: right;
            font-size: 0.95rem;
            padding-top: 6px;
        }

        .history-list::-webkit-scrollbar {
            width: 8px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .display {
            width: 100%;
            height: 72px;
            border: none;
            border-radius: 14px;
            background: #f1f5f9;
            margin-bottom: 0;
            padding: 10px 14px 10px 58px;
            text-align: right;
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .display-wrap {
            position: relative;
            margin-bottom: 14px;
        }

        .copy-btn {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            transform: none;
            width: 48px;
            height: auto;
            border: none;
            border-radius: 14px 0 0 14px;
            background: #dbeafe;
            color: #1e3a8a;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.2s ease, background 0.2s ease;
            border-right: 1px solid #bfdbfe;
        }

        .copy-btn:hover {
            filter: brightness(0.98);
        }

        .copy-btn:active {
            transform: scale(0.97);
        }

        .copy-btn.copied {
            background: #86efac;
            color: #166534;
        }

        .copy-btn svg {
            width: 17px;
            height: 17px;
        }

        .display:focus {
            outline: none;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(6, minmax(58px, auto));
            gap: 10px;
        }

        .key {
            min-height: 58px;
            border: none;
            border-radius: 12px;
            background: var(--key);
            color: var(--text);
            font-size: 1.45rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.2s ease;
        }

        .key:hover {
            filter: brightness(0.98);
        }

        .key:active {
            transform: translateY(1px) scale(0.99);
        }

        .key-operator {
            background: var(--key-operator);
        }

        .key-action {
            background: var(--key-action);
        }

        .key-equals {
            background: var(--key-equals);
            grid-column: 2 / span 3;
            grid-row: 6;
        }

        .key-zero {
            grid-column: span 2;
        }

        .key-clear {
            grid-column: 1;
            grid-row: 1;
        }

        .key-backspace {
            grid-column: 2;
            grid-row: 1;
        }

        .key-open-paren {
            grid-column: 3;
            grid-row: 1;
        }

        .key-close-paren {
            grid-column: 4;
            grid-row: 1;
        }

        .key-op-pow {
            grid-column: 1;
            grid-row: 6;
        }

        .key-op-div {
            grid-column: 1;
            grid-row: 2;
        }

        .key-op-mul {
            grid-column: 1;
            grid-row: 3;
        }

        .key-op-sub {
            grid-column: 1;
            grid-row: 4;
        }

        .key-op-add {
            grid-column: 1;
            grid-row: 5;
        }

        .key-n7 { grid-column: 2; grid-row: 2; }
        .key-n8 { grid-column: 3; grid-row: 2; }
        .key-n9 { grid-column: 4; grid-row: 2; }
        .key-n4 { grid-column: 2; grid-row: 3; }
        .key-n5 { grid-column: 3; grid-row: 3; }
        .key-n6 { grid-column: 4; grid-row: 3; }
        .key-n1 { grid-column: 2; grid-row: 4; }
        .key-n2 { grid-column: 3; grid-row: 4; }
        .key-n3 { grid-column: 4; grid-row: 4; }
        .key-n0 { grid-column: 2 / span 2; grid-row: 5; }
        .key-dot { grid-column: 4; grid-row: 5; }

        @media (max-width: 420px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .calculator {
                border-radius: 16px;
                padding: 14px;
            }

            .history-panel {
                border-radius: 16px;
            }

            .display {
                height: 64px;
                font-size: 1.8rem;
            }

            .copy-btn {
                width: 42px;
            }

            .key {
                min-height: 64px;
                font-size: 2rem;
            }

            .history-title {
                font-size: 1.5rem;
            }

            .history-item,
            .history-empty {
                font-size: 1.425rem;
            }
        }
    </style>
</head>
<body>
    <main class="page-wrap">
        <div class="app-shell">
            <section class="calculator" aria-label="Basic calculator">
                <!-- Display area for showing current input and result -->
                <div class="display-wrap">
                    <input id="display" class="display" type="text" value="0" readonly aria-label="Calculator display">
                    <button id="copyBtn" class="copy-btn" type="button" aria-label="Copy display value" title="Copy result">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <rect x="9" y="9" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"></rect>
                            <rect x="5" y="5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"></rect>
                        </svg>
                    </button>
                </div>

                <!-- Calculator buttons: clear, operators, digits, equals -->
                <div class="keys">
                    <button type="button" class="key key-action key-clear" data-action="clear">C</button>
                    <button type="button" class="key key-action key-backspace" data-action="backspace">⌫</button>
                    <button type="button" class="key key-operator key-open-paren" data-value="(">(</button>
                    <button type="button" class="key key-operator key-close-paren" data-value=")">)</button>
                    <button type="button" class="key key-operator key-op-pow" data-value="^">^</button>
                    <button type="button" class="key key-operator key-op-div" data-value="/">/</button>
                    <button type="button" class="key key-operator key-op-mul" data-value="*">*</button>
                    <button type="button" class="key key-operator key-op-sub" data-value="-">-</button>
                    <button type="button" class="key key-operator key-op-add" data-value="+">+</button>

                    <button type="button" class="key key-n7" data-value="7">7</button>
                    <button type="button" class="key key-n8" data-value="8">8</button>
                    <button type="button" class="key key-n9" data-value="9">9</button>

                    <button type="button" class="key key-n4" data-value="4">4</button>
                    <button type="button" class="key key-n5" data-value="5">5</button>
                    <button type="button" class="key key-n6" data-value="6">6</button>

                    <button type="button" class="key key-n1" data-value="1">1</button>
                    <button type="button" class="key key-n2" data-value="2">2</button>
                    <button type="button" class="key key-n3" data-value="3">3</button>

                    <button type="button" class="key key-zero key-n0" data-value="0">0</button>
                    <button type="button" class="key key-dot" data-value=".">.</button>
                    <button type="button" class="key key-equals" data-action="equals">=</button>
                </div>
            </section>

            <aside id="historyPanel" class="history-panel" aria-label="Calculation history">
                <h2 class="history-title">Last 10 Calculations</h2>
                <ul id="historyList" class="history-list"></ul>
                <p id="historyEmpty" class="history-empty">No calculations yet.</p>
            </aside>
        </div>
    </main>

    <script>
        const display = document.getElementById("display");
        const copyBtn = document.getElementById("copyBtn");
        const calculator = document.querySelector(".calculator");
        const keys = document.querySelector(".keys");
        const historyPanel = document.getElementById("historyPanel");
        const historyList = document.getElementById("historyList");
        const historyEmpty = document.getElementById("historyEmpty");
        const MAX_HISTORY = 10;
        const MAX_DISPLAY_CHARS = 20;

        let expression = "";
        let justEvaluated = false;
        let calculationHistory = [];
        let pendingAutoClosers = 0;

        function getMobileFontScale() {
            return window.matchMedia("(max-width: 420px)").matches ? 1.5 : 1;
        }

        function updateDisplay(value) {
            const displayValue = value || "0";
            const visibleValue = displayValue.length > MAX_DISPLAY_CHARS
                ? displayValue.slice(0, MAX_DISPLAY_CHARS)
                : displayValue;
            const mobileScale = getMobileFontScale();

            display.value = visibleValue;

            if (visibleValue.length <= 8) {
                display.style.fontSize = `${1.5 * mobileScale}rem`;
            } else if (visibleValue.length <= 12) {
                display.style.fontSize = `${1.3 * mobileScale}rem`;
            } else if (visibleValue.length <= 16) {
                display.style.fontSize = `${1.1 * mobileScale}rem`;
            } else {
                display.style.fontSize = `${0.9 * mobileScale}rem`;
            }
        }

        function isOperator(char) {
            return ["+", "-", "*", "/", "^"].includes(char);
        }

        function currentNumberSegment() {
            const cursorIndex = expression.length - pendingAutoClosers;
            const beforeCursor = expression.slice(0, cursorIndex);
            const parts = beforeCursor.split(/[+\-*/^()]/);
            return parts[parts.length - 1] || "";
        }

        function insertAtCursor(value) {
            const cursorIndex = expression.length - pendingAutoClosers;
            expression = `${expression.slice(0, cursorIndex)}${value}${expression.slice(cursorIndex)}`;
        }

        function canInsertOperatorAtCursor(value) {
            const cursorIndex = expression.length - pendingAutoClosers;
            const beforeCursor = expression.slice(0, cursorIndex);
            const lastChar = beforeCursor.slice(-1);
            const secondLastChar = beforeCursor.slice(-2, -1);

            if (!beforeCursor) {
                return value === "-";
            }

            if (lastChar === "(") {
                return value === "-";
            }

            if (isOperator(lastChar)) {
                // Allow unary minus immediately after another operator: e.g., 3*(-2)
                if (value === "-" && lastChar !== "-") {
                    return true;
                }

                // Prevent chains like *-- while preserving unary negatives.
                if (value === "-" && lastChar === "-" && isOperator(secondLastChar)) {
                    return false;
                }

                return false;
            }

            return true;
        }

        function appendValue(value) {
            if (justEvaluated && !isOperator(value)) {
                expression = "";
                pendingAutoClosers = 0;
            }
            justEvaluated = false;

            const cursorIndex = expression.length - pendingAutoClosers;
            const beforeCursor = expression.slice(0, cursorIndex);
            const lastChar = beforeCursor.slice(-1);

            if (value === "(") {
                if (expression.length + 2 > MAX_DISPLAY_CHARS) {
                    return;
                }

                insertAtCursor("()");
                pendingAutoClosers += 1;
                updateDisplay(expression);
                return;
            }

            if (value === ")") {
                if (pendingAutoClosers > 0) {
                    pendingAutoClosers -= 1;
                    updateDisplay(expression);
                    return;
                }

                const openCount = (expression.match(/\(/g) || []).length;
                const closeCount = (expression.match(/\)/g) || []).length;

                if (openCount > closeCount && expression.length < MAX_DISPLAY_CHARS && !isOperator(lastChar) && lastChar !== "(") {
                    insertAtCursor(")");
                    updateDisplay(expression);
                }

                return;
            }

            if (isOperator(value)) {
                if (!canInsertOperatorAtCursor(value)) {
                    return;
                }

                if (isOperator(lastChar)) {
                    const replaceIndex = cursorIndex - 1;
                    expression = `${expression.slice(0, replaceIndex)}${value}${expression.slice(cursorIndex)}`;
                    updateDisplay(expression);
                    return;
                }
            }

            if (value === ".") {
                const segment = currentNumberSegment();

                if (segment.includes(".")) {
                    return;
                }

                if (!beforeCursor || isOperator(lastChar) || lastChar === "(") {
                    insertAtCursor("0");
                }
            }

            if (expression.length >= MAX_DISPLAY_CHARS) {
                return;
            }

            insertAtCursor(value);
            updateDisplay(expression);
        }

        function clearAll() {
            expression = "";
            justEvaluated = false;
            pendingAutoClosers = 0;
            updateDisplay("0");
        }

        function backspace() {
            if (!expression) {
                updateDisplay("0");
                return;
            }

            const cursorIndex = expression.length - pendingAutoClosers;

            if (cursorIndex > 0) {
                const charBeforeCursor = expression[cursorIndex - 1];
                const charAtCursor = expression[cursorIndex];

                // If deleting an auto-paired opening bracket, remove its pending closing mate too.
                if (charBeforeCursor === "(" && charAtCursor === ")" && pendingAutoClosers > 0) {
                    expression = `${expression.slice(0, cursorIndex - 1)}${expression.slice(cursorIndex + 1)}`;
                    pendingAutoClosers -= 1;
                } else {
                    expression = `${expression.slice(0, cursorIndex - 1)}${expression.slice(cursorIndex)}`;
                }
            } else if (pendingAutoClosers > 0) {
                expression = expression.slice(0, -1);
                pendingAutoClosers -= 1;
            }

            updateDisplay(expression || "0");
            justEvaluated = false;
        }

        function renderHistory() {
            historyList.innerHTML = "";

            if (calculationHistory.length === 0) {
                historyEmpty.style.display = "block";
                return;
            }

            historyEmpty.style.display = "none";

            calculationHistory.forEach((item) => {
                const li = document.createElement("li");
                li.className = "history-item";
                li.textContent = `${item.input} = ${item.result}`;
                li.title = "Click to reuse this expression";
                li.addEventListener("click", () => {
                    expression = item.input;
                    pendingAutoClosers = 0;
                    justEvaluated = false;
                    updateDisplay(expression || "0");
                });
                historyList.appendChild(li);
            });
        }

        function addToHistory(input, result) {
            const item = { input, result };
            calculationHistory.unshift(item);

            if (calculationHistory.length > MAX_HISTORY) {
                calculationHistory = calculationHistory.slice(0, MAX_HISTORY);
            }

            renderHistory();
        }

        function syncHistoryHeight() {
            historyPanel.style.height = `${calculator.offsetHeight}px`;
        }

        async function copyDisplayValue() {
            const textToCopy = display.value || "0";

            try {
                await navigator.clipboard.writeText(textToCopy);
            } catch (error) {
                display.removeAttribute("readonly");
                display.select();
                document.execCommand("copy");
                display.setAttribute("readonly", "readonly");
                display.setSelectionRange(display.value.length, display.value.length);
            }

            copyBtn.classList.add("copied");
            copyBtn.title = "Copied";

            setTimeout(() => {
                copyBtn.classList.remove("copied");
                copyBtn.title = "Copy result";
            }, 900);
        }

        function calculateResult() {
            if (!expression) {
                return;
            }

            const inputExpression = expression;

            // Reject malformed expressions such as trailing operators or illegal characters.
            if (/[^0-9+\-*/.^()]/.test(expression) || /[+\-*/.^]$/.test(expression)) {
                updateDisplay("Error");
                expression = "";
                pendingAutoClosers = 0;
                justEvaluated = true;
                return;
            }

            let bracketDepth = 0;
            for (const char of expression) {
                if (char === "(") {
                    bracketDepth += 1;
                }

                if (char === ")") {
                    bracketDepth -= 1;
                    if (bracketDepth < 0) {
                        updateDisplay("Error");
                        expression = "";
                        pendingAutoClosers = 0;
                        justEvaluated = true;
                        return;
                    }
                }
            }

            if (bracketDepth !== 0 || /[+\-*/.^(]$/.test(expression)) {
                updateDisplay("Error");
                expression = "";
                pendingAutoClosers = 0;
                justEvaluated = true;
                return;
            }

            try {
                const evaluatedExpression = expression.replace(/\^/g, "**");
                const result = Function(`"use strict"; return (${evaluatedExpression});`)();

                if (!Number.isFinite(result)) {
                    throw new Error("Invalid calculation");
                }

                expression = String(Number(result.toFixed(10)));

                if (expression.length > MAX_DISPLAY_CHARS) {
                    expression = expression.slice(0, MAX_DISPLAY_CHARS);
                }

                updateDisplay(expression);
                addToHistory(inputExpression, expression);
                justEvaluated = true;
                pendingAutoClosers = 0;
            } catch (error) {
                updateDisplay("Error");
                expression = "";
                pendingAutoClosers = 0;
                justEvaluated = true;
            }
        }

        keys.addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) {
                return;
            }

            const action = button.dataset.action;
            const value = button.dataset.value;

            if (action === "clear") {
                clearAll();
                return;
            }

            if (action === "backspace") {
                backspace();
                return;
            }

            if (action === "equals") {
                calculateResult();
                return;
            }

            if (value) {
                appendValue(value);
            }
        });

        copyBtn.addEventListener("click", copyDisplayValue);

        document.addEventListener("keydown", (event) => {
            const { key } = event;

            if (/^[0-9]$/.test(key)) {
                appendValue(key);
                return;
            }

            if (["+", "-", "*", "/", "^", "(", ")"].includes(key)) {
                appendValue(key);
                return;
            }

            if (key === "Enter" || key === "=") {
                event.preventDefault();
                calculateResult();
                return;
            }

            if (key === ".") {
                appendValue(key);
                return;
            }

            if (key === "Backspace") {
                event.preventDefault();
                backspace();
                return;
            }

            if (key === "Escape" || key.toLowerCase() === "c") {
                clearAll();
            }
        });

        // Initialize display on first load.
        updateDisplay("0");
        renderHistory();
        syncHistoryHeight();

        window.addEventListener("resize", syncHistoryHeight);
    </script>
</body>
</html>
