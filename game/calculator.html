<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <style>
        :root {
            --bg-1: #f8fafc;
            --bg-2: #dbeafe;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --key: #e2e8f0;
            --key-operator: #bfdbfe;
            --key-action: #fecaca;
            --key-equals: #86efac;
            --shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 20%, rgba(191, 219, 254, 0.6), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(134, 239, 172, 0.4), transparent 35%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .page-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .app-shell {
            width: min(100%, 760px);
            display: grid;
            grid-template-columns: minmax(300px, 360px) minmax(220px, 280px);
            gap: 16px;
            align-items: start;
        }

        .calculator {
            width: 100%;
            background: var(--panel);
            border-radius: 20px;
            padding: 18px;
            box-shadow: var(--shadow);
        }

        .history-panel {
            background: var(--panel);
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .history-title {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--muted);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .history-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 8px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            background: #f1f5f9;
            text-align: right;
            font-weight: 600;
            word-break: break-all;
        }

        .history-empty {
            color: var(--muted);
            text-align: right;
            font-size: 0.95rem;
            padding-top: 6px;
        }

        .history-list::-webkit-scrollbar {
            width: 8px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 8px;
        }

        .display {
            width: 100%;
            height: 72px;
            border: none;
            border-radius: 14px;
            background: #f1f5f9;
            margin-bottom: 0;
            padding: 10px 14px 10px 58px;
            text-align: right;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text);
        }

        .display-wrap {
            position: relative;
            margin-bottom: 14px;
        }

        .copy-btn {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            transform: none;
            width: 48px;
            height: auto;
            border: none;
            border-radius: 14px 0 0 14px;
            background: #dbeafe;
            color: #1e3a8a;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.2s ease, background 0.2s ease;
            border-right: 1px solid #bfdbfe;
        }

        .copy-btn:hover {
            filter: brightness(0.98);
        }

        .copy-btn:active {
            transform: scale(0.97);
        }

        .copy-btn.copied {
            background: #86efac;
            color: #166534;
        }

        .copy-btn svg {
            width: 17px;
            height: 17px;
        }

        .display:focus {
            outline: none;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .key {
            min-height: 58px;
            border: none;
            border-radius: 12px;
            background: var(--key);
            color: var(--text);
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.08s ease, filter 0.2s ease;
        }

        .key:hover {
            filter: brightness(0.98);
        }

        .key:active {
            transform: translateY(1px) scale(0.99);
        }

        .key-operator {
            background: var(--key-operator);
        }

        .key-action {
            background: var(--key-action);
        }

        .key-equals {
            background: var(--key-equals);
            grid-row: span 2;
        }

        .key-zero {
            grid-column: span 2;
        }

        @media (max-width: 420px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .calculator {
                border-radius: 16px;
                padding: 14px;
            }

            .history-panel {
                border-radius: 16px;
            }

            .display {
                height: 64px;
                font-size: 1.6rem;
            }

            .copy-btn {
                width: 42px;
            }

            .key {
                min-height: 52px;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>
    <main class="page-wrap">
        <div class="app-shell">
            <section class="calculator" aria-label="Basic calculator">
                <!-- Display area for showing current input and result -->
                <div class="display-wrap">
                    <input id="display" class="display" type="text" value="0" readonly aria-label="Calculator display">
                    <button id="copyBtn" class="copy-btn" type="button" aria-label="Copy display value" title="Copy result">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <rect x="9" y="9" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"></rect>
                            <rect x="5" y="5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="2"></rect>
                        </svg>
                    </button>
                </div>

                <!-- Calculator buttons: clear, operators, digits, equals -->
                <div class="keys">
                    <button type="button" class="key key-action" data-action="clear">C</button>
                    <button type="button" class="key key-operator" data-value="^">^</button>
                    <button type="button" class="key key-operator" data-value="/">/</button>
                    <button type="button" class="key key-operator" data-value="*">*</button>
                    <button type="button" class="key key-operator" data-value="-">-</button>

                    <button type="button" class="key" data-value="7">7</button>
                    <button type="button" class="key" data-value="8">8</button>
                    <button type="button" class="key" data-value="9">9</button>
                    <button type="button" class="key key-operator" data-value="+">+</button>

                    <button type="button" class="key" data-value="4">4</button>
                    <button type="button" class="key" data-value="5">5</button>
                    <button type="button" class="key" data-value="6">6</button>
                    <button type="button" class="key key-equals" data-action="equals">=</button>

                    <button type="button" class="key" data-value="1">1</button>
                    <button type="button" class="key" data-value="2">2</button>
                    <button type="button" class="key" data-value="3">3</button>
                    <button type="button" class="key key-zero" data-value="0">0</button>
                    <button type="button" class="key" data-value=".">.</button>
                </div>
            </section>

            <aside id="historyPanel" class="history-panel" aria-label="Calculation history">
                <h2 class="history-title">Last 10 Calculations</h2>
                <ul id="historyList" class="history-list"></ul>
                <p id="historyEmpty" class="history-empty">No calculations yet.</p>
            </aside>
        </div>
    </main>

    <script>
        const display = document.getElementById("display");
        const copyBtn = document.getElementById("copyBtn");
        const calculator = document.querySelector(".calculator");
        const keys = document.querySelector(".keys");
        const historyPanel = document.getElementById("historyPanel");
        const historyList = document.getElementById("historyList");
        const historyEmpty = document.getElementById("historyEmpty");
        const MAX_HISTORY = 10;
        const MAX_DISPLAY_CHARS = 20;

        let expression = "";
        let justEvaluated = false;
        let calculationHistory = [];

        function updateDisplay(value) {
            const displayValue = value || "0";
            const visibleValue = displayValue.length > MAX_DISPLAY_CHARS
                ? displayValue.slice(0, MAX_DISPLAY_CHARS)
                : displayValue;

            display.value = visibleValue;

            if (visibleValue.length <= 10) {
                display.style.fontSize = "2rem";
            } else if (visibleValue.length <= 14) {
                display.style.fontSize = "1.7rem";
            } else if (visibleValue.length <= 17) {
                display.style.fontSize = "1.45rem";
            } else {
                display.style.fontSize = "1.2rem";
            }
        }

        function isOperator(char) {
            return ["+", "-", "*", "/", "^"].includes(char);
        }

        function currentNumberSegment() {
            const parts = expression.split(/[+\-*/^]/);
            return parts[parts.length - 1] || "";
        }

        function appendValue(value) {
            if (justEvaluated && !isOperator(value)) {
                expression = "";
            }
            justEvaluated = false;

            const lastChar = expression.slice(-1);
            const secondLastChar = expression.slice(-2, -1);

            if (isOperator(value)) {
                if (!expression) {
                    if (value === "-") {
                        expression = "-";
                        updateDisplay(expression);
                    }
                    return;
                }

                // Allow unary negative after another operator: e.g., 3*-2
                if (value === "-" && isOperator(lastChar) && lastChar !== "-") {
                    expression += value;
                    updateDisplay(expression);
                    return;
                }

                // Prevent chains like 3*--2 while preserving unary negatives.
                if (value === "-" && lastChar === "-" && isOperator(secondLastChar)) {
                    return;
                }

                if (isOperator(lastChar)) {
                    expression = expression.slice(0, -1) + value;
                    updateDisplay(expression);
                    return;
                }
            }

            if (value === ".") {
                const segment = currentNumberSegment();

                if (segment.includes(".")) {
                    return;
                }

                if (!expression || isOperator(lastChar)) {
                    expression += "0";
                }
            }

            if (expression.length >= MAX_DISPLAY_CHARS) {
                return;
            }

            expression += value;
            updateDisplay(expression);
        }

        function clearAll() {
            expression = "";
            justEvaluated = false;
            updateDisplay("0");
        }

        function renderHistory() {
            historyList.innerHTML = "";

            if (calculationHistory.length === 0) {
                historyEmpty.style.display = "block";
                return;
            }

            historyEmpty.style.display = "none";

            calculationHistory.forEach((item) => {
                const li = document.createElement("li");
                li.className = "history-item";
                li.textContent = item;
                historyList.appendChild(li);
            });
        }

        function addToHistory(item) {
            calculationHistory.unshift(item);

            if (calculationHistory.length > MAX_HISTORY) {
                calculationHistory = calculationHistory.slice(0, MAX_HISTORY);
            }

            renderHistory();
        }

        function syncHistoryHeight() {
            historyPanel.style.height = `${calculator.offsetHeight}px`;
        }

        async function copyDisplayValue() {
            const textToCopy = display.value || "0";

            try {
                await navigator.clipboard.writeText(textToCopy);
            } catch (error) {
                display.removeAttribute("readonly");
                display.select();
                document.execCommand("copy");
                display.setAttribute("readonly", "readonly");
                display.setSelectionRange(display.value.length, display.value.length);
            }

            copyBtn.classList.add("copied");
            copyBtn.title = "Copied";

            setTimeout(() => {
                copyBtn.classList.remove("copied");
                copyBtn.title = "Copy result";
            }, 900);
        }

        function calculateResult() {
            if (!expression) {
                return;
            }

            const inputExpression = expression;

            // Reject malformed expressions such as trailing operators or illegal characters.
            if (/[^0-9+\-*/.^]/.test(expression) || /[+\-*/.^]$/.test(expression)) {
                updateDisplay("Error");
                expression = "";
                justEvaluated = true;
                return;
            }

            try {
                const evaluatedExpression = expression.replace(/\^/g, "**");
                const result = Function(`"use strict"; return (${evaluatedExpression});`)();

                if (!Number.isFinite(result)) {
                    throw new Error("Invalid calculation");
                }

                expression = String(Number(result.toFixed(10)));

                if (expression.length > MAX_DISPLAY_CHARS) {
                    expression = expression.slice(0, MAX_DISPLAY_CHARS);
                }

                updateDisplay(expression);
                addToHistory(`${inputExpression} = ${expression}`);
                justEvaluated = true;
            } catch (error) {
                updateDisplay("Error");
                expression = "";
                justEvaluated = true;
            }
        }

        keys.addEventListener("click", (event) => {
            const button = event.target.closest("button");
            if (!button) {
                return;
            }

            const action = button.dataset.action;
            const value = button.dataset.value;

            if (action === "clear") {
                clearAll();
                return;
            }

            if (action === "equals") {
                calculateResult();
                return;
            }

            if (value) {
                appendValue(value);
            }
        });

        copyBtn.addEventListener("click", copyDisplayValue);

        document.addEventListener("keydown", (event) => {
            const { key } = event;

            if (/^[0-9]$/.test(key)) {
                appendValue(key);
                return;
            }

            if (["+", "-", "*", "/", "^"].includes(key)) {
                appendValue(key);
                return;
            }

            if (key === "Enter" || key === "=") {
                event.preventDefault();
                calculateResult();
                return;
            }

            if (key === ".") {
                appendValue(key);
                return;
            }

            if (key === "Backspace") {
                event.preventDefault();
                expression = expression.slice(0, -1);
                updateDisplay(expression || "0");
                justEvaluated = false;
                return;
            }

            if (key === "Escape" || key.toLowerCase() === "c") {
                clearAll();
            }
        });

        // Initialize display on first load.
        updateDisplay("0");
        renderHistory();
        syncHistoryHeight();

        window.addEventListener("resize", syncHistoryHeight);
    </script>
</body>
</html>
