<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Images</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            overflow-x: hidden;
        }
        body {
            margin: 0;
            padding-top: 6px;
        }
        .container {
            overflow-x: hidden;
        }
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .controls-row select {
            width: auto;
            min-width: 130px;
        }
        .controls-row .btn {
            margin: 0;
        }
        #question-counter {
            min-width: 62px;
            text-align: left;
            font-weight: 600;
            color: #495057;
        }
        @keyframes fall {
            0% { top: 0; opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
        .falling-image {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            animation: fall 5s linear forwards;
        }
        .falling-image img {
            max-width: 200px; /* Adjust size as needed */
            height: auto;
        }
        #answer-display {
            min-height: 1.4em;
            margin-top: 4px;
            color: #a8adb5;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1 style="margin-bottom: 8px;">Falling Images</h1>
        <div id="falling-words-container" style="position: relative; height: 420px; overflow: hidden;"></div>
        <div class="controls-row">
            <select id="level-select" class="form-control">
                <option value="football">Football</option>
                <option value="personalities">Personalities</option>
                <option value="states">States</option>
                <option value="hindu">Hindu</option>
                <option value="flag_l1">Flag - L1</option>
				<option value="flag_l2">Flag - L2</option>
				<option value="flag_l3">Flag - L3</option>
            </select>
            <button class="btn btn-primary" onclick="startFallingWords()">Start Game</button>
            <button class="btn btn-info" onclick="showAnswer()">Show Answer</button>
            <button class="btn btn-warning" onclick="togglePause()">Pause Now</button>
            <select id="speed-select" class="form-control" onchange="changeSpeed(this.value)">
                <option value="1">1 sec</option>
                <option value="3" selected>3 sec</option>
                <option value="5">5 sec</option>
                <option value="10">10 sec</option>
            </select>
            <span id="question-counter">0/0</span>
        </div>
        <div id="answer-display"></div>
    </div>
    
    <script>
        const levelWords = {
            "football": ["gen_bebeto.jpg", "gen_beckham.jpg", "gen_jairzinho.jpg", "gen_maradona.jpg", "gen_mbappe.jpg", "gen_messi.jpg", "gen_neymar.jpg", "gen_neymar2.jpg", "gen_pele.jpg", "gen_pele2.jpg", "gen_rivaldo.jpg", "gen_romario.jpg", "gen_ronaldo.jpg", "gen_ronaldo2.jpg", "gen_tostao.jpg", "gen_zico.jpg", "gen_zidane.jpg"],

            "personalities": ["gen_ambedkar.jpg", "gen_arnab.jpg", "gen_azad.jpg", "gen_bhagat.jpg", "gen_gandhi.jpg", "gen_indira.jpg", "gen_kohli.jpg", "gen_lal.jpg", "gen_modi.jpg", "gen_nehru.jpg", "gen_patel.jpg", "gen_radhakrish.jpg", "gen_saroj.jpg", "gen_subhash.jpg", "gen_tagore.jpg", "gen_annieBesant.jpg","gen_annieBesant2.jpg","gen_dadabhaiNaroji.jpg","gen_gopalKrishnaGokale.jpg","gen_alluriSitaramaRaju.jpg","gen_veerSavarkar.jpg", "gen_rahul_gandhi.jpg", "gen_sachin_tendulkar.png", "gen_bumrah.jpg", "gen_rohit_sharma.jpg", "gen_sunil_gavaskar.jpg", "gen_kapil_dev.jpg"],

            "states": ["gen_tamilnadu.png", "gen_karnataka.png", "gen_kerala.png", "gen_maharashtra.png", "gen_madhya_pradesh.png", "gen_uttarpradesh.png", "gen_andhra.png", "gen_westBengal.png", "gen_rajasthan.png", "gen_gujarat.png", "gen_odisha.png", "gen_telangana.png", "gen_uttarakhand.png", "gen_assam.png", "gen_arunachal.png", "gen_chattisgarh.png", "gen_jharkhand.png", "gen_himachal.png", "gen_punjab.png", "gen_ladakh.png", "gen_kashmir.png", "gen_lakshadweep.png", "gen_andaman.png"],

            "hindu": ["Kanakadasa.jpg", "MeeraBai.jpg", "RamakrishnaParamahamsa.jpg", "Sadguru.jpg", "SriSriRaviShankar.jpg", "SwamiVivekananda.jpg", "Tiruvalluvar.jpg"],
			
			"flag_l1": ["India.png", "China.png", "Pakistan.png", "Nepal.png", "Bangladesh.png", "United_States_of_America.png", "United_Kingdom.png", "Australia.png", "Soviet_Union.png", "Israel.png", "Brazil.png", "France.png", "New_Zealand.png", "Sri_Lanka.png", "Bhutan.png", "Japan.png", "South_Korea.png", "Singapore.png", "Germany.png"],

			"flag_l2": ["Afghanistan.png", "Argentina.png", "Armenia.png", "Austria.png", "Azerbaijan.png", "Bahamas.png", "Bahrain.png", "Belgium.png", "Cambodia.png", "Canada.png", "Cuba.png", "Denmark.png", "Dominican_Republic.png", "Egypt.png", "Finland.png", "Gibraltar.png", "Greece.png", "Greenland.png", "Hong_Kong.png", "Hungary.png", "Iceland.png", "Indonesia.png", "Iran.png", "Iraq.png", "Italy.png", "Jamaica.png", "Kenya.png", "Kuwait.png", "Liberia.png", "Libya.png", "Malaysia.png", "Maldives.png", "Mexico.png", "Morocco.png", "Myanmar.png", "Netherlands.png", "Nigeria.png", "North_Korea.png", "Norway.png", "Oman.png", "Philippines.png", "Poland.png", "Portugal.png", "Qatar.png", "Saudi_Arabia.png", "South_Africa.png", "Spain.png", "Switzerland.png", "Taiwan.png", "Thailand.png", "Tibet.png", "Trinidad_and_Tobago.png", "Turkey.png", "UAE.png", "Uganda.png", "Ukraine.png", "Vatican_City.png", "Vietnam.png", "Yemen.png", "Zimbabwe.png"],
			
			"flag_l3": ["Albania.png", "Algeria.png", "American_Samoa.png", "Andorra.png", "Angola.png", "Anguilla.png", "Antigua_and_Barbuda.png", "Aruba.png", "Barbados.png", "Belarus.png", "Belize.png", "Benin.png", "Bermuda.png", "Bolivia.png", "Bosnia.png", "Botswana.png", "British_Virgin_Islands.png", "Brunei.png", "Bulgaria.png", "Burkina_Faso.png", "Burundi.png", "Cameroon.png", "Cape_Verde.png", "Cayman_Islands.png", "Central_African_Republic.png", "Chad.png", "Chile.png", "Christmas_Island.png", "Colombia.png", "Comoros.png", "Cook_Islands.png", "Costa_Rica.png", "Croatia.png", "Cyprus.png", "Cyprus_Northern.png", "Czech_Republic.png", "Côte_d'Ivoire.png", "Democratic_Republic_of_the_Congo.png", "Djibouti.png", "Dominica.png", "Ecuador.png", "El_Salvador.png", "Equatorial_Guinea.png", "Eritrea.png", "Estonia.png", "Ethiopia.png", "Falkland_Islands.png", "Faroe_Islands.png", "Fiji.png", "French_Polynesia.png", "Gabon.png", "Gambia.png", "Georgia.png", "Ghana.png", "Grenada.png", "Guam.png", "Guatemala.png", "Guinea.png", "Guinea_Bissau.png", "Guyana.png", "Haiti.png", "Honduras.png", "Ireland.png", "Jordan.png", "Kazakhstan.png", "Kiribati.png", "Kyrgyzstan.png", "Laos.png", "Latvia.png", "Lebanon.png", "Lesotho.png", "Liechtenstein.png", "Lithuania.png", "Luxembourg.png", "Macao.png", "Macedonia.png", "Madagascar.png", "Malawi.png", "Mali.png", "Malta.png", "Marshall_Islands.png", "Martinique.png", "Mauritania.png", "Mauritius.png", "Micronesia.png", "Moldova.png", "Monaco.png", "Mongolia.png", "Montserrat.png", "Mozambique.png", "Namibia.png", "Nauru.png", "Netherlands_Antilles.png", "Nicaragua.png", "Niger.png", "Niue.png", "Norfolk_Island.png", "Palau.png", "Panama.png", "Papua_New_Guinea.png", "Paraguay.png", "Peru.png", "Pitcairn_Islands.png", "Puerto_Rico.png", "Republic_of_the_Congo.png", "Romania.png", "Russian_Federation.png", "Rwanda.png", "Saint_Kitts_and_Nevis.png", "Saint_Lucia.png", "Saint_Pierre.png", "Saint_Vicent_and_the_Grenadines.png", "Samoa.png", "San_Marino.png", "Sao_Tomé_and_Príncipe.png", "Senegal.png", "Serbia_and_Montenegro.png", "Seychelles.png", "Sierra_Leone.png", "Slovakia.png", "Slovenia.png", "Soloman_Islands.png", "Somalia.png", "South_Georgia.png", "Sudan.png", "Suriname.png", "Swaziland.png", "Sweden.png", "Syria.png", "Tajikistan.png", "Tanzania.png", "Timor-Leste.png", "Togo.png", "Tonga.png", "Tunisia.png", "Turkmenistan.png", "Turks_and_Caicos_Islands.png", "Tuvalu.png", "Uruguay.png", "US_Virgin_Islands.png", "Uzbekistan.png", "Vanuatu.png", "Venezuela.png", "Wallis_and_Futuna.png", "Zambia.png"]

        };

        const levelFolders = {
            "football": "football",
            "personalities": "",
            "states": "states",
            "hindu": "hindu",
            "flag_l1": "flag",
            "flag_l2": "flag",
            "flag_l3": "flags"
        };

        const container = document.getElementById('falling-words-container');
        const answerDisplay = document.getElementById('answer-display');
        let isPaused = false;
        let currentImage = null;
        let fallDuration = 3;
        let currentImageFile = null;
        let runSeq = 0;
        let answerTimerId = null;
        let currentQuestionNumber = 0;
        let currentQuestionTotal = 0;

        const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        const isCurrentRun = (runId) => runId === runSeq;

        function updateQuestionCounter() {
            const counterEl = document.getElementById('question-counter');
            if (!counterEl) {
                return;
            }
            counterEl.textContent = `${currentQuestionNumber}/${currentQuestionTotal}`;
        }

        function showAnswerAtNinetyPercent(answer, questionFontSizePx, runId) {
            clearTimeout(answerTimerId);
            answerTimerId = setTimeout(() => {
                if (!isCurrentRun(runId)) {
                    return;
                }
                answerDisplay.textContent = answer;
                answerDisplay.style.fontSize = `${questionFontSizePx}px`;
            }, fallDuration * 900);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function buildCandidateImageSrcs(imageFile, folder) {
            const candidates = [];
            const add = (src) => {
                if (src && !candidates.includes(src)) {
                    candidates.push(src);
                }
            };

            add(folder ? `./pics/${folder}/${imageFile}` : `./pics/${imageFile}`);
            add(`./pics/${imageFile}`);

            ["football", "flag", "flags", "personalities", "states", "hindu"].forEach(commonFolder => {
                add(`./pics/${commonFolder}/${imageFile}`);
            });

            return candidates;
        }

        function createFallingImage(imageFile, folder, runId) {
            if (!isCurrentRun(runId)) {
                return Promise.resolve(false);
            }
            return new Promise(resolve => {
                const div = document.createElement('div');
                div.className = 'falling-image';
                const img = document.createElement('img');
                const candidateSrcs = buildCandidateImageSrcs(imageFile, folder);
                let candidateIndex = 0;
                img.src = candidateSrcs[candidateIndex] || '';
                img.onerror = () => {
                    candidateIndex += 1;
                    if (candidateIndex < candidateSrcs.length) {
                        img.src = candidateSrcs[candidateIndex];
                    } else {
                        img.style.display = 'none';
                    }
                };
                img.alt = imageFile.split('.')[0];
                div.appendChild(img);
                answerDisplay.textContent = '';
                div.style.animation = `fall ${fallDuration}s linear forwards`;
                div.style.animationPlayState = isPaused ? 'paused' : 'running';
                container.appendChild(div);
                currentImage = div;
                currentImageFile = imageFile; // Store current image file for answer
                const questionFontSizePx = 28;
                showAnswerAtNinetyPercent(imageFile.split('.')[0], questionFontSizePx, runId);

                div.addEventListener('animationend', () => {
                    if (container.contains(div)) {
                        container.removeChild(div);
                    }
                    if (isCurrentRun(runId)) {
                        answerDisplay.textContent = '';
                    }
                    resolve(isCurrentRun(runId));
                }, { once: true });
            });
        }

        async function startFallingWords() {
            const runId = ++runSeq;
            const selectedLevel = document.getElementById('level-select').value;
            const images = levelWords[selectedLevel] ? [...levelWords[selectedLevel]] : []; // Fallback to empty array
            const imageFolder = Object.prototype.hasOwnProperty.call(levelFolders, selectedLevel)
                ? levelFolders[selectedLevel]
                : selectedLevel;
            if (images.length === 0) {
                console.error(`No images found for level: ${selectedLevel}`);
                return;
            }
            clearTimeout(answerTimerId);
            container.innerHTML = '';
            answerDisplay.textContent = '';
            currentImage = null;
            currentImageFile = null;
            isPaused = false;
            currentQuestionTotal = images.length;
            currentQuestionNumber = 0;
            updateQuestionCounter();

            while (isCurrentRun(runId)) {
                shuffleArray(images);
                for (const imageFile of images) {
                    while (isPaused && isCurrentRun(runId)) {
                        await sleep(100);
                    }
                    currentQuestionNumber = (currentQuestionNumber % currentQuestionTotal) + 1;
                    updateQuestionCounter();
                    if (!isCurrentRun(runId) || !(await createFallingImage(imageFile, imageFolder, runId))) {
                        return;
                    }
                    await sleep(500);
                }
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            document.querySelectorAll('.falling-image').forEach(image => {
                image.style.animationPlayState = isPaused ? 'paused' : 'running';
            });
        }

        function changeSpeed(speed) {
            fallDuration = speed;
        }

        function showAnswer() {
            if (currentImageFile) {
                const answer = currentImageFile.split('.')[0]; // Remove extension
                answerDisplay.textContent = answer;
                answerDisplay.style.fontSize = '28px';
            } else {
                answerDisplay.textContent = 'No image falling yet!';
                answerDisplay.style.fontSize = '28px';
            }
        }
    </script>
</body>
</html>
