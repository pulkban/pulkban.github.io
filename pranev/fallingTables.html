<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Multiplication Questions</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { overflow-x: hidden; }
        body { margin: 0; }
        .container { overflow-x: hidden; }
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .controls-row select { width: auto; min-width: 110px; }
        .controls-row .btn { margin: 0; }
        #answer-display { min-height: 1.4em; margin-top: 8px; color: #a8adb5; line-height: 1.2; }
        @keyframes fall { 0% { top: 0; opacity: 1; } 100% { top: 90%; opacity: 0; } }
        .falling-question { position: absolute; left: 50%; transform: translateX(-50%); font-size: 4em; text-align: center; animation: fall 5s linear forwards; }
    </style>
</head>
<body>
    <div class="container text-center">
        <h1>Falling Multiplication Questions</h1>
        <div id="falling-words-container" style="position: relative; height: 313px; overflow: hidden;"></div>
        <div class="controls-row">
            <button class="btn btn-primary" onclick="startFallingQuestions()">Start Game</button>
            <button class="btn btn-warning" onclick="togglePause()">Pause</button>
            <select id="speed-select" class="form-control" onchange="changeSpeed(this.value)">
                <option value="1">1 sec</option>
                <option value="3" selected>3 sec</option>
                <option value="5">5 sec</option>
            </select>
        </div>
        <div id="answer-display"></div>
    </div>
    
    <script>
        function generateMultiplicationQuestions() {
            const questions = [];
            const tables = [2, 3, 4, 5, 6, 7, 8, 9];
            for (const table of tables) {
                for (let multiplier = 1; multiplier <= 12; multiplier++) {
                    questions.push(`${table} x ${multiplier} =`);
                }
            }
            shuffleArray(questions);
            return questions;
        }

        const container = document.getElementById('falling-words-container');
        const answerDisplay = document.getElementById('answer-display');
        let isPaused = false;
        let currentQuestion = null;
        let fallDuration = 3;
        let gameId = 0;
        let answerTimerId = null;

        function getTableAnswer(question) {
            const match = question.match(/(\d+)\s*x\s*(\d+)/i);
            if (!match) {
                return question;
            }
            return String(Number(match[1]) * Number(match[2]));
        }

        function showAnswerAtNinetyPercent(answer, questionFontSizePx) {
            const showDelay = fallDuration * 900;
            clearTimeout(answerTimerId);
            answerTimerId = setTimeout(() => {
                answerDisplay.textContent = answer;
                answerDisplay.style.fontSize = `${questionFontSizePx / 2}px`;
            }, showDelay);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createFallingQuestion(question) {
            return new Promise(resolve => {
                const div = document.createElement('div');
                div.className = 'falling-question';
                div.textContent = question;
                answerDisplay.textContent = '';
                div.style.animation = `fall ${fallDuration}s linear forwards`;
                div.style.animationPlayState = isPaused ? 'paused' : 'running';
                container.appendChild(div);
                currentQuestion = div;
                const questionFontSizePx = parseFloat(getComputedStyle(div).fontSize) || 32;
                showAnswerAtNinetyPercent(getTableAnswer(question), questionFontSizePx);

                div.addEventListener('animationend', () => {
                    container.removeChild(div);
                    resolve();
                });
            });
        }

        async function startFallingQuestions() {
            const questions = generateMultiplicationQuestions();
            const thisGameId = ++gameId;
            let index = 0;
            clearTimeout(answerTimerId);
            container.innerHTML = '';
            answerDisplay.textContent = '';
            isPaused = false;

            while (thisGameId === gameId) {
                if (isPaused) {
                    await new Promise(resolve => {
                        const checkPause = setInterval(() => {
                            if (!isPaused || thisGameId !== gameId) {
                                clearInterval(checkPause);
                                resolve();
                            }
                        }, 100);
                    });
                }

                if (thisGameId !== gameId) {
                    break;
                }

                if (index >= questions.length) {
                    shuffleArray(questions);
                    index = 0;
                }

                await createFallingQuestion(questions[index]);
                index++;
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }

        function togglePause() {
            isPaused = !isPaused;
            document.querySelectorAll('.falling-question').forEach(question => {
                question.style.animationPlayState = isPaused ? 'paused' : 'running';
            });
        }

        function changeSpeed(speed) {
            fallDuration = speed;
        }
    </script>
</body>
</html>
